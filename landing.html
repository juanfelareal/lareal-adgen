<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adly — Create static Ads. In Bulk. In seconds.</title>
  <meta name="description" content="HTML static ads that scale ecom brands with +30 proven templates.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0d11;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --accent: #f97316;
      --accent-hover: #ea580c;
    }

    html {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      margin: 0;
      padding: 0;
    }

    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(249,115,22,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero {
      text-align: center;
      max-width: 720px;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .headline {
      font-size: clamp(40px, 7vw, 72px);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -3px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .headline .line { display: block; }
    .headline .dim { color: var(--text-muted); }

    .sub {
      font-size: clamp(15px, 2vw, 18px);
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 480px;
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.35s;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 24px rgba(249, 115, 22, 0.25);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    .cta:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(249, 115, 22, 0.35);
    }

    .cta:active { transform: translateY(0); }

    .cta svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
    }

    .cta:hover svg { transform: translateX(3px); }

    .lang-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.6s;
    }
    .lang-btn {
      padding: 6px 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }
    .lang-btn:hover:not(.active) { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .headline { letter-spacing: -2px; }
      .cta { width: 100%; justify-content: center; padding: 16px 24px; font-size: 15px; }
      .hero { padding: 32px 20px; width: 100%; }
      .lang-toggle { top: 12px; right: 12px; }
    }
  </style>
</head>
<body>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
  </div>

  <div class="hero">
    <span class="tag">Adly</span>
    <h1 class="headline">
      <span class="line" data-i18n="h1">Create static Ads.</span>
      <span class="line dim" data-i18n="h2">In Bulk.</span>
      <span class="line dim" data-i18n="h3">In seconds.</span>
    </h1>
    <p class="sub" data-i18n="sub">HTML static ads that scale ecom brands with +30 proven templates.</p>
    <a href="index.html" class="cta">
      <span data-i18n="cta">Create stunning static Ads in bulk</span>
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 10h12M12 4l6 6-6 6"/>
      </svg>
    </a>
  </div>

  <script>
    const T = {
      en: {
        h1: 'Create static Ads.',
        h2: 'In Bulk.',
        h3: 'In seconds.',
        sub: 'HTML static ads that scale ecom brands with +30 proven templates.',
        cta: 'Create stunning static Ads in bulk'
      },
      es: {
        h1: 'Crea Ads estáticos.',
        h2: 'En masa.',
        h3: 'En segundos.',
        sub: 'Ads estáticos en HTML que escalan marcas ecom con +30 plantillas probadas.',
        cta: 'Crea Ads estáticos impactantes en masa'
      }
    };

    let lang = localStorage.getItem('adly-lang') || 'en';

    function setLang(l) {
      lang = l;
      localStorage.setItem('adly-lang', l);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === l.toUpperCase()));
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (T[l] && T[l][key]) el.textContent = T[l][key];
      });
    }

    // Apply saved lang on load
    setLang(lang);
  </script>

</body>
</html>
